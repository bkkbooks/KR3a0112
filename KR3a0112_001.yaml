body:
  text: 正學隅見述華隂王宏撰著記曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平程子明道曰格至也物者凡遇事皆物也欲以窮至物理也程子伊川曰凡有一物必有一理窮而致之所謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也自一身之中以至萬物之理但理㑹得多自然豁然有覺處問格物是外物是性分中物曰不拘凡眼前無非是物物物皆有理如火之所以熱水之所以寒至於君臣父子間皆是理又問只窮一物見此一物便還見得諸理否曰須是遍求雖顔子亦只能聞一知十若到後來逹理了雖億萬亦可通問觀物察己還因見物反求諸身否曰不必如此說物我一理才明彼即曉此合內外之道也所務於窮理者非道盡窮了天下萬物之理又不道是窮得一理便到只要積纍多後自然見去朱子曰程子說格物曰格至也格物而至於物則物理盡意句俱到不可移易儒者之學大要以窮理為先大學不曰窮理而謂之格物只是使人就實處窮究窮理者欲知事物之所以然與其所當然者而已知其所以然故志不惑知其所當然故行不謬非謂取彼之理而歸諸此也程子所謂物我一理才明彼即曉此格物致知於物上窮得一分之理則我之知亦致得一分物理窮得愈多則我之知愈廣十事格得九事通透一事未通透不妨一事只格得九分一分未通透最不可致知格物只是一事非是今日格物明日又致知格物以理言致知以心言心包萬理萬理具於一心不能存得心不能窮得理不能窮得理不能盡得心大學論治國平天下許多事却歸在格物上凡事事物物各有一箇道理若能窮得道理則施之事物莫不各當其位如人君止於仁人臣止於敬之類各有一至極道理凡萬物莫不各有一道理若窮理則萬物之理皆不出此問此是萬物皆備於我曰極是問所謂窮理不知是反己求之於心惟復逐物而求於物曰不是如此事事物物皆有箇道理窮得十分盡方是格物不是此心如何去窮理不成物自有箇道理心又有箇道理枯槁其心全與物不接却使此理自見萬無是事不用自家心如何别向物上求一般道理不知物上道理誰去窮得看道理須是見得實方是有功效處若於上面添些𤣥妙奇特便是見他實理未透今之學者不曽親切見得而臆度揣摸為說皆助長之病也道理止平看意思自見眼前凡所應接底都是物都有箇極至之理便要知得到若知不到便都沒分明若知得到决定著恁地做更無第二第三著止緣人見道理不破便恁地茍簡都做不得第一義問如何是第一義曰如為人君止於仁之類决定著恁地不恁地便不得又如在朝須著進君子退小人此是第一義有功决定著賞有罪决定著誅更無小人可用之理更無包含小人之理惟見得不破便道小人不可去也有可用之理此都是第二第三義如何㑹好凡事事窮得盡道理事事占得第一義甚麼樣剛方正大且如為學决定是要做聖賢此是第一義若道自家做不得且隨分依稀做些子此是見不破聖賢所謂博學無所不學也自吾身所謂大經大本以及天下之事事物物甚而一字半字之義莫不在所當窮而未始有不消理㑹者雖曰不能盡究然亦只得隨吾聰明力量理㑹將去久久須有所至或問格物致知之學與世之所謂博物洽聞者奚以異曰此以反身窮理為主而必究其本末是非之極至彼以狥外誇多為務而不核其表裏真妄之實然必究其極是以知愈博而心愈明不核其實是以識愈多而心愈窒此正為己為人之分不可不察也吾聞之也天道流行造化發育凡有聲色貌象而盈於天地之間者皆物也既有是物則其所以為是物者莫不各有當然之則而自不容己是皆得於天之所賦而非人之所能為也今且以其至切而近者言之則心之為物實主於身其體則有仁義禮智之性其用則有惻隱羞惡恭敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及於身之所具則有口鼻耳目四肢之用又次而及於身之所接則有君臣父子夫婦長幼朋友之常是皆必有當然之則而自不容己所謂理也外而至於人則人之理不異於己也遠而至於物則物之理不異於人也極其大則天地之運古今之變不能外也盡於小則一塵之微一息之頃不能遺也是乃上帝所降之衷蒸民所秉之彞劉子所謂天地之中夫子所謂性與天道子思所謂天命之性孟子所謂仁義之心程子所謂天然自有之中張子所謂萬物之一原邵子所謂道之形體者但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以人之與物賢之與愚相為懸絶而不能同耳以其理之同故以一人之心而於天下萬物之理無不能知以其禀之異故於其理或有所不能窮也理有未窮故其知有不盡知有不盡則其心之所發必不能純於義理而無雜乎物欲之私此其所以意有不誠心有不正身有不修而天下國家不可得而治也昔者聖人蓋有憂之是以於其始教為之小學而使之習於誠敬則所以收其放心養其德性者已無所不用其至矣及其進乎大學則又使之即夫事物之中因其所知之理推而究之以各到乎其極則吾之知識亦得以周遍精切而無不盡也若其用力之方則或考之事為之著或察之念慮之微或求之文字之中或索之講論之際使於身心性情之德人倫日用之常以至天地鬼神之變鳥獸草木之宜自其一物之中莫不有以見其所當然而不容己與其所以然而不可易者必其表裏精粗無所不盡而又益推其類以通之至於一日脫然而貫通焉則於天下之物皆有以究其義理精微之所極而吾之聰明睿智亦皆有以極其心之本體而無不盡矣近世大儒有為格物致知之說者曰格猶扞也禦也能扞禦外物而後能知至道也又有推其說者曰人生而靜其性本無不善而有為不善者外物誘之也所謂格物以致其知者亦曰扞去外物之誘而本然之善自明耳是其為說不亦善乎曰天生蒸民有物有則則物之與道固未始相離也今曰禦外物而後可以知至道則是絶父子而後可以知孝慈離君臣而後可以知仁敬也是安有此理哉若曰所謂外物者不善之誘耳非指君臣父子而言也則夫外物之誘人莫甚於飲食男女之欲然推其本則固亦莫非人之所當有而不能無者也但於其間自有天理人欲之辨而不可以毫釐差耳惟其徒有是物而不能察於吾之所以行乎其間者孰為天理孰為人欲是以無以致其克復之功而物之誘於外者得以奪乎天理之本然也今不即物以窮其原而徒惡物之誘乎己乃欲一切扞而去之則是必閉口枵腹然後可以得飲食之正絶滅種類然後可以全夫婦之别也是雖異端無君無父之教有不能充其說者况乎聖人大中至正之道而得以此亂之哉夫泛論知行之理而就一事之中以觀之則知之為先行之為後無可疑者然合夫知之淺深行之大小而言則非有以先成乎小亦將何以馴致乎其大者哉蓋古人之教自其孩幼而教之以孝弟誠敬之實及其少長而博之以詩書禮樂之文皆所以使之即夫一事一物之間各有以知其義理之所在而致涵養踐履之功也及其十五成童學於大學則其灑掃應對之間禮樂射御之際所以涵養踐履之者略己小成矣於是不離乎此而教之以格物以致其知焉致知云者因其所已知者推而致之以及其所未知者而極其至也是必至於舉天地萬物之理而一以貫之然後為知之至而所謂誠意正心修身齊家治國平夫下者至是而無所不盡其道焉今就其一事之中而論之則先知後行固各有其序矣誠欲因夫小學之成以進夫大學之始則非涵養踐履之有素亦豈能居然以去雜亂紛糾之心而格物以致其知哉且易之所謂忠信修辭者聖學之實事貫始終而言者也以其淺而小者言之則自其常視毋誑男唯女俞之時固己知而能之矣知至至之則由行此而又知其所至也此知之深者也知終終之則由知至而又進以終之也此行之大者也故大學之書雖以格物致知為用力之始然非謂初不涵養踐履而直從事於此也又非謂物未格知未至則意可以不誠心可以不正身可以不修家可以不齊也但以為必知之至然後所以治己治人者始有以盡其道耳若曰必俟知至而後可行則夫事親從兄承上接下乃人生之所不能一日廢者豈可謂吾知未至而暫輟以俟其至而後行哉抑聖賢所謂知者雖有淺深然不過如前所論二端而已但至於廓然貫通則內外精粗自無二致也理之所在即是中道惟窮之不深則無所準則而有過不及之患未有窮理既深而反有此患也易曰精義入神以致用也蓋惟如此然後可以應務未至於此則凡所作為皆出於私意之鑿冥行而已宏撰曰格物之說古今聚訟細思之終當以朱子之說為正今不煩辨但有一問而已夫聖經二百五字全學也凡為學之事無不備矣如將格物不作即物窮理解則大學中所謂博文之功安在聖賢所言學問思辨多聞多見博學詳說諸語不一而足於大學當何屬不幾闕乎學者平心靜氣讀朱子所補傳久之當自知其不可易矣孔子曰博學之審問之慎思之明辨之篤行之此欲誠意先致知格物之說也而致知格物初非二事故不曰先而曰在以見內外合一之學他日又曰學而不思則罔思而不學則殆思學並用格致同功而聖人之意尢重格物故又曰吾嘗終日不食終夜不寢以思無益不如學也蓋聖賢之學其用力之始未有不從事於博而後約者經傳所言歷歷可據此至明至平至正至大之理本無可疑自司馬文正公有格去物欲之解而陸文安公益倡為異說後之儒者私臆紛出不惟悖程朱之訓亦且顯違孔曽之教借易簡之義以榛塞傳注此崔后渠所謂罪不勝誅者也朱子以致知格物為博文之注今即以博文為致知格物之注尚何疑之有如必以朱子之解格物為非不知何以解博文二字乎原其故秪以格字難解遂致說者紛紛耳然格字訓至詩書所載如格於上下七旬有苗格格於文祖神之格思有恥且格等語莫不合者近世邵文莊公嘗因醫者言切脉謂以切字訓格字庶幾近之王夏器訓格為通謂是潛通無間之意此亦皆有至字義其訓為去唯周書格其非心孟子格君心之非為然耳若漢儒訓為來羅南城訓為事皆合式則其僻陋無庸辨者矣大學自平天下說到誠意致知漸說向內去然求諸內者必有資於外致知者萬無去聞見之功之理故必說格物見外之不可廢也內外之間無先後於是變其文曰在方是合內外徹始終之學蓋聖人立言無弊如此最為明白易見程朱之訓確有可循不知後儒何故必欲别尋𤣥解耶豫宗兄孚公素留心書㫖一日與豫偶論及此謂既說到誠意致知至此反說向外去終可疑豫曰思而不學則殆格物者以吾心格之非求知於外也故曰吾心之全體大用無不明矣蓋古之學者為己其用力之始必有事於博學而後乃收一貫之功此不易之理要非馳騖廣遠如所稱博物君子云爾也此格物物字實兼身心意知國家天下言物有本末之物即在此物字內故艾千子曰此物字該得廣昔有問格物於馮恭定公者公曰言致知不言格物則落空物字有三解萬物皆備於我物字對我而言格去物欲物字指私欲而言此物字兼物我而言王心齊謂格物是格物有本末之物致知是致知所先後之知最為有見格物是格其知如何致意如何誠心如何正身如何修家國天下如何齊治平中間孰為本孰為末孰當先孰當後節目次第一一講究明白則誠正修齊治平工夫才得不差明德新民始止於至善耳此格物所以為大學第一義按心齊之學本非正學而此之所言却亦無悖於朱子窮理之㫖恭定之解尢為明切正可參看然謂物字應上物字知字應上知字聖人立言斷不如此必謂相應又何以置事字乎先儒謂知是心之靈不可作虛字看朱子所謂心之神明妙衆理而宰萬事者是也據此則致知知字與知所先後知字亦自有分不可不辨也平治齊修正誠致格皆用力字天下國家身心意知物皆定體字知所先後知字是用力字心齊以致知為致知所先後之知亦缺分曉矣故蔡虛齊云知所先後知字淺楊慈湖謂格物不可以窮理訓云吾心本無物忽有物焉格去之可也物格則吾心自瑩塵去則鑑自明滓去則水自清矣此全是禪宗又疑大學之文支離破碎謂非孔子所作不知其何所根據乃欲申其邪說至排聖經而不顧孰謂慈湖之罪隱而難知哉又嘗謂聖人之教一而已矣四教之說必記者之誤此則執固不通可發一笑者也王陽明謂格字不可以至字訓乃以正字訓之引格其非心大臣格君心之非之類以為正其不正以歸於正之義其說莫詳於答顧東橋一書中有云即物窮理是就事事物物上求其所謂定理者也是以吾心而求理於事事物物之中析心與理而為二矣按朱子之言物我一原格物之理致吾之知正心理合一矣安見其析而為二乎用力之久豁然貫通原非泥物而求今云事事物物上求其定理遷就其詞以申己之辨毋乃失其衡也乎又謂求理於物如求孝之理於親之身以為求之於外也夫孝之理在親之身與在吾之心一也如謂不可求孝之理於親之身又豈可離親之身以求孝之理乎即如親之有饑飽寒暖此在親之身者也所謂物也知其饑矣又知其當食知其寒矣又知其當衣此在吾之心者也所謂知也就親之身察其所以受饑受寒者而體之於心以為其食之多寡衣之厚薄然後食之衣之咸當其則而不至於有害此親之身與吾之心合一者也所謂格物致知也若不問之親而但求之心則其多寡厚薄之間必有不得其宜者矣又或親有疾病必診視之當補當攻方可用藥豈可曰孝之理在吾之心而不復求之於親之身也乎大抵天下之理內外雖不相離然必有內外之分所以有合內外之道如無分矣又何以言合要其所以合者即性之德也故曰誠者非自成己而已也所以成物也即陽明亦嘗有云成已成物雖本一事而先後之序自不容紊乃其所為正告東橋者則云所謂致知格物者致吾心之良知於事事物物也吾心之良知即所謂天理也致吾心之良知之天理於事事物物則事事物物皆得其理矣致吾心之良知者致知也事事物物皆得其理者格物也是合心與理而為一者也此段所言已與聖經本㫖不合至溫凊奉養之喻有云意欲溫凊意欲奉養者所謂意也而未可謂之誠意必實行其溫凊奉養之意務求自慊而無自欺然後謂之誠意知如何而為溫凊之節知如何而為奉養之宜者所謂知也而未可謂之致知必致其知如何為溫凊之節者之知而實以之溫凊致其知如何為奉養之宜者之知而實以之奉養然後謂之致知溫凊之事奉養之宜所謂物也而未可謂之格物必其於溫凊之事奉養之宜也一如其良知之所知當如何為溫凊之節奉養之宜者而為之無一毫之不盡然後謂之格物初一段所云誠意是已第二段云實以之溫凊實以之奉養又非誠意之事乎第三段云為之無一毫之不盡則直併說到修身之事矣此其語意重復最為支離决裂奈何反以支離决裂歸咎於朱子之說也按朱子之訓格物致知誠意雖有次第然相因為用實非二事豈真析知行為兩截哉今其語録具在一一可考陽明之譏亦何其不察之甚也陽明又有與陸元靜書云必欲此心純乎天理而無一毫人欲之私非防於未萌之先而克於方萌之際不能防於未萌之先而克於方萌之際此正中庸戒慎恐懼大學致知格物之功舍此之外無别功矣按此所言明是正心誠意之功如何說作致知格物之功又先與元靜論照心非動妄心非照主於本體明覺之自然謂有所動即妄無所動即照有妄有照則二二則息無妄無照則不二不二則不息蓋其學大類禪宗故謂近世格物致知之說只一知字尚未有下落若致字工夫全不曽道著所見如彼宜其所言之異然竟不回顧經傳何其果於自信也程朱以物為萬物故以格物為即物窮理陽明謂即物窮理亦是玩物喪志其說本於陸子皆由看物字有間故也今略舉四書中所言物字證之如詩云有物有則中庸云盡物之性孟子云萬物皆備於我此物字可以為外物而忽之乎格此有則之物格此盡性之物格此皆備之物尚可以為玩物而喪志乎且既云窮理矣又何以云喪志也程朱云物我一理今陽明直以物之理與心之理為二矣果如所言則孔子之所謂知周乎萬物與遠取諸物者亦應不免於玩物之譏矣格物二字可以别解不審知周乎萬物與遠取諸物可以别生異解否陽明謂大學格物與繫辭窮理大㫖雖同而微有分辨窮理者兼格致誠正而為功也故言窮理則格致誠正之功皆在其中言格物則必兼舉致知誠意正心而後其功始備而密此說極是若謂格物有行不當以格物偏屬之窮理又不當以窮理專屬之知則非也按陽明此言實本之程子易傳語録程子云窮理盡性以至於命三事一時並了元無次序不可將窮理作知之事若實窮得理即性命亦可了豫謂繫辭窮理二字是包舉言之朱傳窮理二字原與即物二字連說是且就物上說此其微異也故謂言格物則必兼舉致知誠意正心之功則可謂言格物則已包誠意正心之功在內則不可蓋聖人為學有序斷無一蹴而至之理知行雖不相離亦斷無行在知內之理程子之說豫竊疑其有直捷過高之弊若謂只一窮理便能盡性至命則只道窮理足矣盡性云云不幾贅乎且盡性盡字實有工夫窮之盡之實有次第程子於此傳後又有云理則須窮性則須盡命則不可言窮與盡只是至於命也此段正可參觀程子前說是從學既成後說出未免稍缺分曉終不若朱子本義云窮天下之理盡人物之性而合於天道此聖人作易之極功也明晰切實確不可易矣再詳程子之意是謂繫辭此處窮理二字不可但作知之事非謂窮理非知也大學格物自專屬知經文明說致知在格物何必强生支節陽明云窮理盡性聖人之成訓茍格物之說而果即窮理之義則聖人何不直曰致知在窮理豫亦云好學近乎知力行近乎仁亦聖人之成訓格物果如陽明之說則聖人何不直曰致知在力行乎陽明之學在醇疵之間其醇者實有志於聖人之道不墮浮華支離之習而其疵則間涉於禪也其曰為善去惡是格物自非孔曽本㫖馮恭定獨辨其無善無惡心之體之說而於此略而不論豫謂格物之訓正不可不辨窮至事物之理六字㑹通其意的是格字確解以扞字去字正字訓之終不得也吳秋圃訓為格而通之之意此正與至字有合乃又看物字異謂天下事物至賾安有窮時又謂朱子因至字不明又添一窮字明是强經就我又以朱子補傳為牽强附㑹則皆衍陽明緒餘失其衡者也先儒以古之節為逆推工夫知至節為順推效驗蓋工夫是逆用效驗是順成聖賢之學莫貴於逆格物工夫正是逆用然則即物窮理之說又何疑乎近人以古之節六先字為應知所先知至節七后字為應知所後其說起於盧玉溪黃洵饒艾千子曽斥其誤蓋後字原有二義先後後字是用力字乃去聲而后后字是定體字乃上聲字義不明遑問其他故高子業云字學明六經如指掌且知所先後是一時事知所先而先之則知所後而後之矣豈可分屬此說與王心齊以格物為應物有本末之物致知為應知所先後之知皆舉業時文話豫嘗謂近世諸儒講學不脫舉業時文習氣正此類也陽明之學以致良知為主故别解格物近乃有謂格物即以知格之是致知工夫自在先故不曰先格物而曰在格物此語牽强明悖經文果如所說則當曰致知以格物亦不當曰在格物矣不知於下文物格而后知至而后字如何說得去艾千子云致知在格物雖不說先畢竟格在致先故曰物格而后知至致方求融貫而至則己㑹通矣此正論也又林次崖駁陽明格物之說有云經文言物格而后知至知至而后意誠是意誠工夫又後格物一步也既以格物為去私意則當物格時私意己無了又何須再去誠意再做毋自欺慎獨許大工夫得無疊牀重屋耶若謂格物即是誠意又不應說物格而后知至知至而后意誠分做三節中間又用箇而后字按次崖此論雖陽明復起能無口塞乎汪石潭羅整菴皆陽明素交石潭著濯舊稿整菴著困知記皆言陽明之學之失石潭曰近世有尊象山而鄙朱子為訓詁章句之學者曰吾心學也好異者靡然趨之惑世誣民其罪大也整菴曰格物之義程朱之訓明且盡矣當為萬物無疑人之有心固然亦是一物然以格物為格此心則不可此理在人則謂之性在天則謂之命心也者人之神明而理之存主處也豈可謂心即理而以窮理為窮此心哉象山之為此言誤人多矣其流禍迄今益甚士之好高欲速者更唱迭和駸駸乎有丕變於夷之勢每讀至此為之悚然太息豫友李子德謂先朝天下之亂由於學術之不正其首禍乃王陽明也豫嘗嫌其言太過然持世明教亦卓論也士而有志於正學則又烏可不凛然知警也哉嘗讀陸子語録有一條論王荆公云或問介甫比商鞅何如先生云商鞅是腳踏實地他亦不問王霸只要事成却是先定規模介甫慕堯舜三代之名不曽踏得實處故所成就者王不成霸不就本原皆因不能格物摸索形似便以為堯舜三代如此而已所以學者先要窮理按陸子此言與朱子所謂格物窮理之說何異豈非理不可易心不容泯有意執為格物之解者不覺無意於論他事中倐而吐露如此耶敢以此問世之為陸子之學者陸子又嘗謂學有講明有踐履以致知格物為講明之學此亦與朱子即物窮理之說無異昔有舉此以問陽明者陽明乃云此是陸子見未精一處執其成見既以非朱又以非陸得毋勝心用事乎敢以此問世之為王氏之學者陽明解致知格物之謬其病原於為知行並進之說然古人所謂知行不相離者言人當重行不可徒知云爾凡聖賢之言知行皆分言之亦皆先言知而後言行如曰或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也曰好學近乎知力行近乎仁曰知之者不如好之者好之者不如樂之者見於經傳所載者多矣皆知先而行後之明徵也故朱子云論先後知為先論輕重行為重今謂知行並進行在知內初無先後驟聽之豈非高論然而中有毫釐千里之差果如所言則孔子何以言有知及之仁不能守之之人子路何以有未之能行唯恐有聞之時凡為此論皆實本之釋氏抑所謂善知識即在彼法中亦不盡爾也况聖賢之道哉周子曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉朱子答陸子美書曰太極篇首一句最是長者所深排然殊不知不言無極則太極同於一物而不足為萬物之根柢不言太極則無極淪於空寂而不能為萬化之根本只此一句便見其下語精密微妙無窮而向下所說許多道理條貫􅍺絡井井不亂只今便在目前而亘古亘今攧撲不破只恐自家見得未曽如此分明直截則其所可疑者乃在此而不在彼也又答陸子美書曰太極之說某謂周先生之意恐學者錯認太極别為一物故著無極二字以明之此是推原前賢立言之本意所以不厭重復蓋有深指而來諭便謂某以太極下同一物是則非惟不盡周先生之妙㫖而於某之淺陋妄說亦未察其情矣又謂著無極字便有虛無好高之弊則未知尊兄所謂太極是有形器之物耶無形器之物耶若果無形而但有理則無極即是無形太極即是有理明矣又安得為虛無而好高乎陸子與朱元晦書曰梭山兄謂太極圖說與通書不類疑非周子所為不然則或是其學未成時所作不然則或是傳他人之文後人不辨也蓋通書理性命章言中焉止矣二氣五行化生萬物五殊二實二本則一曰一曰中即太極也未嘗於其上加無極字動靜章言五行隂陽隂陽太極亦無無極之文假令太極圖說是其所傳或其少時所作則作通書時不言無極蓋己知其說之非矣此言殆未可忽也兄謂梭山急迫看人文字未能盡彼之情而欲遽申己意是以輕於立論徒為多說而未必果當於理大學曰無諸己而后非諸人人無古今智愚賢不肖皆言也皆文字也觀兄與梭山之書已不能酬斯言矣尚何以責梭山哉尊兄向與梭山書云不言無極則太極同於一物而不足為萬物根柢不言太極則無極淪於空寂而不能為萬化根本夫太極者實有是理聖人從而發明之耳非以空言立論使後人簸弄於頰舌紙筆之間也其為萬物根本固自素定其足不足能不能豈以人言不言之故耶易大傳曰易有太極聖人言有今乃言無何也作大傳時不言無極太極何嘗同於一物而不足為萬物根柢耶洪範五皇極列在九疇之中不言無極太極亦何嘗同於一物而不足為萬化根本耶太極固自若也尊兄只管言來言去轉加糊塗此真所謂輕於立論徒為多說而未必果當於理也兄號句句而論字字而議有年矣宜益工益密立言精確足以悟疑辨惑乃反疏脫如此宜有以自反矣後書又謂無極即是無形太極即是有理周先生恐學者錯認太極别為一物故著無極二字以明之易大傳曰形而上者謂之道又曰一隂一陽之謂道一隂一陽已是形而上者况太極乎曉文義者舉知之矣自有大傳至今幾年未聞有錯認太極别為一物者設有愚謬至此奚啻不能以三隅反何足尚煩老先生特地於太極上加無極二字以曉之乎且極字亦不可以形字釋之蓋極者中也言無極則是猶言無中也是奚可哉若懼學者泥於形器而申釋之則宜如詩言上天之載而於下贊之曰無聲無臭可也豈宜以無極字加於太極之上朱子發謂濂溪得太極圖於穆伯長伯長之傳出於陳希夷其必有考希夷之學老氏之學也無極二字出於老子知其雄章吾聖人之書所無有也老子首章言無名天地之始有名萬物之母而卒同之此老氏之宗㫖也無極而太極即是此㫖老氏學之不正見理不明所蔽在此兄於此學用力之深為日之久曽此之不能辨何也通書中焉止矣之言與此昭然不類而兄曽不之察何也太極圖說以無極二字冠首而通書終篇未嘗一及無極字二程言論文字至多亦未嘗一及無極字假令其初實有是圖觀其後來未嘗一及無極字可見其道之進而不自以為是也兄今考訂注釋表顯尊信如此其至恐未得為善祖述者也潘清逸詩文可見矣彼豈能知濂溪者明道伊川親師承濂溪當時名賢居潘右者亦復不少濂溪之志卒屬於潘可見其子孫之不能世其學也兄何據之篤乎梭山兄之言恐未宜忽也朱子答陸子靜書曰來書反復其於無極太極之辨詳矣然以某觀之伏羲作易自一畫以下文王演易自乾元以下皆未嘗言太極也而孔子言之孔子贊易自太極以下未嘗言無極也而周子言之夫先聖後聖豈不同條而共貫哉若於此有以灼然實見太極之真體則知不言者不為少而言之者不為多矣何至若此之紛紛哉今既不然則吾之所謂理者恐其未足以為羣言之折衷又况於人之言有所不盡者又非一二而已乎既䝉不鄙而教之某亦不敢不盡其愚也且夫大傳之太極者何也即兩儀四象八卦之理具於三者之先而緼於三者之內者也聖人之意正以其究竟至極無名可名故特謂之太極猶曰舉天下之至極無以加此云爾初不以其中而命之也至於北極之極屋極之極諸儒雖有以為中者蓋以此物之極嘗在此物之中非指極字而訓之以中也極者至極而已以有形者言之則其四方八面合輳將來到此築底更無去處從此推出四方八面都無向背一切停勻故謂之極耳後人以其居中而能應四外故指其處而以中言之非以其義為可訓中也至於太極則又初無形象方所之可言但以此理至極而謂之極耳今乃以中坐之則是所謂理有未明而不能盡乎人言之意者一也通書理性命章其首二句言理次三句言性次八句言命故其章內無此三字而特以三字名其章以表之則意內之言固已各有所屬矣蓋其所謂靈所謂一者乃為太極而所謂中者乃氣禀之得中與剛善剛惡柔善柔惡者為五性而屬乎五行初未嘗以是為太極也且曰中焉止矣而又下屬於二氣五行化生萬物之云是亦成何等文字義理乎今來喻乃指其中者為太極而屬之下文則又理有未明而不能盡乎人言之意者二也若論無極二字乃是周子灼見道體迥出常情不顧旁人是非不計自己得失勇往直前說出人不敢說底道理令後之學者曉然見得太極之妙不屬有無不落方體若於此看得破方見得此老真得千聖以來不傳之祕非但架屋下之屋疊牀上之牀而已也今乃以為未然是又理有未明而不能盡乎人言之意者三也至於大傳既曰形而上者謂之道矣而又曰一隂一陽之謂道此豈真以隂陽為形而上者哉正所以見一隂一陽雖屬形器然其所以一隂而一陽者是乃道體之所為也故語道體之至極則謂之太極語太極之流行則謂之道雖有二名初無兩體周子所以謂之無極正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也今乃深詆太極之不然則是直以太極為有形狀有方所矣直以隂陽為形而上則又昧於道器之分矣又於形而上者之上復有太極之語則是又以道上别有一物為太極矣此又理有未明而不能盡乎人言之意者四也至某前書所謂不言無極則太極同於一物而不足為萬物根柢不言太極則無極淪於空寂而不能為萬化根本乃是推本周子之意以為當時若不如此兩下說破則讀者錯認語意必有偏見之病聞人說有即謂之實有見人說無即以為真無耳自謂如此說得周子之意已是大煞分明只恐知道者厭其漏泄之過甚不謂如老兄者乃猶以為未穩而難曉也請以某書上下文意詳之豈謂太極可以人言而為加損哉是又理有未明而不能盡乎人言之意者五也來書又謂大傳明言易有太極今乃言無何也此尤非所望於高明者今夏因與人言易其人之論正如此當時對之不覺失笑遂至被劾彼俗儒膠固隨語生解不足深怪老兄平日自視為如何而亦為此言耶老兄且謂大傳之所謂有果如兩儀四象八卦之有定位天地五行萬物之有常形耶周子之所謂無是果虛空斷滅都無生物之理耶此又理有未明而不能盡乎人言之意者六也老子復歸於無極無極乃無窮之義如莊生入無窮之門以游無極之野云爾非若周子所言之意也今乃引之而謂周子之言實出乎彼此又理有未明而不能盡乎人言之意者七也高明之學超出方外固未易以世間言語論量意見測度今且以愚見執方論之則其未合有如前所陳者亦欲奉報又恐徒為紛紛重使世俗觀笑既而思之若遂不言則恐學者終無所取正較是二者寧可見笑於今人不可得罪於後世是以終不獲已而竟陳之陸子又與朱元晦書曰尊兄嘗曉陳同父云欲賢者百尺竿頭進取一步將來不作三代以下人物省得氣力為漢唐分疏即更脫灑磊落今亦欲得尊兄進取一步莫作孟子以下學術省得氣力為無極二字分疏亦更脫灑磊落古人質實不尚智巧言論未詳事實先著知之為知之不知為不知所謂先知覺後知先覺覺後覺者以其事實覺其事實故言即其事事即其言所謂言顧行行顧言周道之衰文貌日勝事實湮于意見典訓蕪于辨說揣量摸寫之工依放假借之似其條畫足以自信其習熟足以自安以子貢之逹又得夫子而師承之尚不免此多學而識之之見非夫子叩之彼固晏然而無疑先行之訓豫欲無言之訓所以覺之者屢矣而終不悟顔子既沒其𫝊固在曽子蓋可觀已尊兄之才未知其與子貢何如今日之病則有深於子貢者尊兄誠能深知此病則來書七條之說當不待條析而自解矣然相去數百里脫或未能自克淹回舊習則不能無遺恨請卒條之來書本是主張無極二字而以明理為說其要則曰於此有以灼然實見太極之真體某竊謂尊兄未曽實見太極若實見太極上面必不更加無極字下面必不更著真體字上面加無極字正是疊牀上之牀下面著真體字正是架屋下之屋虛見之與實見其言固自不同也又謂極者正以其究竟至極無名可名故特謂之太極猶曰舉天下之至極無以加此云爾就令如此又何必更于上面加無極字也若謂欲言其無方所無形狀則前書固言宜如詩言上天之載而於其下贊之曰無聲無臭可也豈宜以無極字加之太極之上繫辭言神無方矣豈可言無神言易無體矣豈可言無易老氏以無為天地之始以有為萬物之母以常無觀妙以常有觀徼直將無字搭在上面正是老氏之學豈可諱也惟其所蔽在此故其流為任術數為無忌憚此理乃宇宙之所固有豈可言無若以為無則君不君臣不臣父不父子不子矣楊朱未遽無君而孟子以為無君墨翟未遽無父而孟子以為無父此其所以為知言也極亦此理也中亦此理也五居九疇之中而曰皇極豈非以其中而命之乎民受天地之中以生而詩言立我蒸民莫匪爾極豈非以其中命之乎中庸曰中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉此理至矣外此豈更復有太極哉以極為中則為不明理以極為形乃為明理乎字義固有一字而數義者用字則有專一義者有兼數義者而字之指歸又有虛實虛字則但當論字義實字則當論所指之實論其所指之實則有非字義所能拘者如元字有始義有長義有大義坤五之元吉屯之元亨則是虛字專為大義不可復以他義參之如乾元之元則是實字論其所指之實則文言所謂善所謂仁皆元也亦豈可以字義拘之哉極字亦如此太極皇極乃是實字所指之實豈容有二充塞宇宙無非此理豈容以字義拘之乎中即至理何嘗不兼至義大學文言皆言知至所謂至者即此理也語讀易者曰能知太極即是知至語讀洪範者曰能知皇極即是知至夫豈不可蓋同指此理則曰極曰中曰至其實一也一極備凶一極無凶此兩極字乃是虛字專為至義却使得極者至極而已於此用而已字方用得當尊兄最號為精通詁訓文義者何為尚惑于此無乃理有未明正以太泥而反失之乎至如直以隂陽為形器而不得為道此尤不敢聞命易之為道一隂一陽而已先後始終動靜晦明上下進退往來闔闢盈虛消長尊卑貴賤表裏隱顯向背順逆存亡得喪出入行藏何適而非一隂一陽哉奇耦相尋變化無窮故曰其為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適說卦曰觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命又曰昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義下繫亦曰易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也今顧以隂陽為非道而直謂之形器其孰為昧於道器之分哉辨難有要領言詞有指歸為辨而失要領觀言而迷指歸皆不明也前書之辨其要領在無極二字尊兄確意主張曲為飾說既以無形釋之又謂周子恐學者錯認太極别為一物故著無極二字以明之某於此見得尊兄只是强說來繇恐無是事故前書舉大傳一隂一陽之謂道形而上者謂之道兩句以見粗識文義者亦知一隂一陽即是形而上者必不至錯認太極别為一物故曰况太極乎此其指歸本自明白而兄曽不之察乃必見誣以道上别有一物為太極通書曰中者和也中節也天下之逹道也聖人之事也故聖人立教俾人自易其惡自至其中而止矣周子之言中如此亦不輕矣外此豈更别有道理乃不得比虛字乎所舉理性命章五句但欲見通書言中言一而不言無極耳中焉止矣一句不妨自是斷章兄必見誣以屬之下文兄之為辨失其指歸大率類此盡信書不如無書某實深信孟子之言前書釋此段亦多援據古書獨頗不信無極之說耳兄遽坐以直絀古書為不足信兄其深文矣哉大傳洪範毛詩周禮與太極圖說孰古以極為形而謂不得為中以一隂一陽為器而謂不得為道此無乃少絀古書為不足信而微任胸臆之所裁乎來書謂若論無極二字乃是周子灼見道體迥出常情不顧旁人是非不計自己得失勇往直前說出人不敢說底道理又謂周子所以謂之無極正以其無方所無形狀誠令如此不知人有甚不敢道處但加之太極之上則吾聖門正不肯如此道耳夫乾確然示人易矣夫坤隤然示人簡矣太極亦何嘗隱於人哉尊兄兩下說無說有不知漏泄得多少如所謂太極真體不傳之祕無物之前隂陽之外不屬有無不落方體迥出常情超出方外等語莫是曽學禪宗所得如此平時既私其說以自高妙及教學者則又往往祕此而多說文義此漏泄之說所從出也以實論之兩頭都無著實彼此只是葛藤未說氣質不美者樂寄此以神其姦不知繫絆多少好氣質底學者既以病己又以病人殆非一言一行之過兄其母以久習於此而重自反也區區之忠竭盡如此流俗無知必謂不遜書曰有言逆於汝心必求諸道諒在高明正所樂聞若猶有疑願不憚下教朱子又答陸子靜書曰來書云古人質實止請卒條之某詳此說蓋欲專務事實不尚空言其意甚美但今所論無極二字某固已謂不言不為少言之不為多矣若以為非則且置之其於事實亦未有害而賢昆仲不見古人指意乃獨無故於此創為浮辨纍數百言三四往返而不能已其為湮蕪亦已甚矣來書云尊兄未嘗止固自不同也某亦謂老兄正為未識太極之本無極而有其體故必以中訓極而又以隂陽為形而上者之道虛見之與實見其言果不同也來書云老氏以無止諱也某詳老氏之言有無以有無為二周子之言有無以有無為一正如南北水火之相反更請仔細著眼未可容易譏評也來書云此理乃止子矣更請詳看某前書曽有無理二字否來書云極亦此止極哉極是名此理之至極中是狀此理之不偏雖然同是此理然其名義各有攸當雖聖賢言之亦未嘗敢有所差易也若皇極之極民極之極乃為標準之意猶曰立於此而示於彼使其有所向望而取正焉耳非以其中而命之也立我蒸民立與粒通即書所謂蒸民乃粒莫匪爾極則爾指后稷而言蓋曰使我衆人皆得粒食莫非爾后稷之所立者是望耳爾字不指天地極字亦非指所受之中中者天下之大本乃以喜怒哀樂之未發此理渾然無所偏倚而然而言太極固無偏倚而為萬化之本然其得名自為至極之極而兼有標準之義初不以中而得名也來書云以極為中止理乎老兄自以中訓極某未嘗以形訓極也今若此言則是已不曉文義而謂它人亦不曉也請更詳之來書云大學文言皆言知至某詳知至二字雖同而在大學則知為實字至為虛字兩字上重而下輕蓋曰心之所知無不到耳在文言則知為虛字至為實字兩字上輕而下重蓋曰有以知其所當至之地耳兩義既自不同而與太極之為至極者又皆不相似請更詳之來書云直以隂陽為形器止道器之分哉若以隂陽為形而上者則形而下者復是何物更請見教若某愚見與其所聞則曰凡有形有象者皆器也其所以為是器之理者則道也如是則來書所謂始終晦明奇耦之屬皆隂陽所為之器獨其所以為是器之理如目之明耳之聰父之慈子之孝乃為道耳如此分别似差明白不知尊意以為如何來書云通書曰止類此周子言中而以和字釋之又曰中節又曰逹道彼非不識字者而其言顯與中庸相戾則亦必有說矣蓋此中字是就氣禀發用而言其無過不及處耳非直指本體未發無所偏倚者而言也豈可以此而訓極為中也哉來書引經必盡全章雖煩不厭而所引通書乃獨截自中焉止矣而下此安得為不誤老兄本自不信周子正使誤引通書亦未為害何必諱此小失而反為不改之過乎來書云大傳止孰古大傳洪範詩禮皆言極而已未嘗謂極為中也先儒以此極處常在物之中央而為四方之所面內而取正故因以中釋之蓋亦未聞甚失而後人遂直以極為中則又不識先儒之本意矣爾雅乃是纂集古今諸儒訓詁以成書其間蓋亦不能無誤不足据以為古又况其間但有以極訓至以殷齊訓中初未嘗以極為中乎來書云又謂周子止道耳無極而太極猶曰莫之為而為莫之致而至又如曰無為之為皆語勢之當然非為别有一物也其意則固若曰非如皇極民極屋極之有方所形象而但有此理之極耳若曉此義則於聖門有何違叛而不肯道乎上天之載是就有中說無無極而太極是就無中說有若實見得即說有說無或先或後都無妨礙今必如此拘泥强生分别曽謂不尚空言專務事實而反如此乎來書云夫乾止自反也太極固未嘗隱於人然人之識太極者則少矣往往只是於禪學中認得箇昭昭靈靈能作用底便謂此是太極而不知所謂太極乃天地萬物本然之理亘古亘今攧撲不破者也迥出常情等語只是俗談即非禪家所能專有不應儒者反當回避况今雖偶然道著而其所見所說却非禪家道理非如它人隂實祖用其說而改頭換面陽諱其所自來也如曰私其說以自妙而又祕之又曰寄此以神其姦又曰繫絆多少好氣質底學者則恐世間自有此人可當此語某雖無狀自省得與此語不相似也大抵老兄昆仲同立此論而其所以立論之意不同子美尊兄自是天資質實厚重當時看得此理有未盡處不能仔細推究但立議論因而自信太過遂不可回見雖有病意實無它老兄却是先立一說務要突過有若子貢以上更不數近世周程諸公故於其言不問是非一例吹毛求疵須要討不是處正使說得十分無病此意却先不好了况其言之粗率又不能無病乎夫子之聖固非以多學而得之然觀其好古敏求實亦未嘗不多學但其中自有一以貫之處耳若只如此空疏杜撰則雖有一而無可貫矣又何足以為孔子乎顔曽所以獨得聖學之傳正為其博文約禮足目俱到亦不是只如此空疏杜撰也子貢雖未得承道統然其所知似亦不在今人之後但未有禪學可改換耳周程之生時世雖在孟子之下然其道則有不約而合者反復來書竊恐老兄於其所言多有未解者恐皆未可遽以顔曽自處而輕之也顔子以能問於不能以多問於寡有若無實若虛犯而不校曽子三省其身惟恐謀之不忠交之不信傳之不習其智之崇如彼而禮之卑如此豈有一毫自滿自足强辨取勝之心乎來書之意所以見教者甚至而其末乃有若猶有疑不憚下教之言某固不敢當此然區區鄙見亦不敢不為老兄傾倒也不審尊意以為如何如曰未然則我日斯邁而月斯征各尊所聞各行所知亦可矣無復可望於必同也近見國史濂溪傳載此圖說乃云自無極而為太極若使濂溪本書實有自為兩字則信如老兄所言不敢辨矣然因渠添此二字却見得本無此字之意愈益分明請試思之陸子又與朱元晦書曰向䝉尊兄促其條析且有無若令兄遽斷來章之戒深以為幸别紙所謂我日斯邁而月斯征各尊所聞各行所知亦可矣無復望其必同也不謂尊兄遽作此語甚非所望君子之過也如日月之食焉過也人皆見之及其更也人皆仰之通人之過雖微針藥久當自悟諒今尊兄必渙然於此矣願依末光以卒餘教宏撰曰以上乃朱陸往復辨無極太極書艾千子謂其兩是而兩足存推其意乃申陸子之說耳蓋陸子之說其理自確朱子則以立教為學者過慮耳平心靜氣句句字字繹之自見或問朱陸之書千子本兩是之今謂申陸子之說如何曰自宋元以來諸儒之斥陸子者嚴矣至國朝益甚千子獨以為當與朱子之說並存故知其意乃申陸子之說耳然豫為此言蓋服千子持論之平非有所抵牾也無極二字實出於老子朱子謂老子所言無極乃無窮之義今觀其文云知雄守雌復歸於嬰兒知白守黑復歸於無極合數句繹之則無極非無窮之義明矣不然何以為復歸二字解也按周子此說頗為道家牽附其援引演論如云無極生太極太極禀無極無極在太極之前無極極而為太極無極為真無太極為妙有諸語不一而太極反似有形狀有方所矣甚矣無極二字之不可加也翻閲道藏乃知陸子之功於此不細此豫所以欲刪去無極以還孔子之太極也宋史原本云自無極而為太極韓恭簡公謂朱子削去自為二字以吾儒正理釋之則亦回護之過矣按朱子嘗以增自為二字為史氏之過今韓氏又以削自為二字為朱子之過皆非也蓋史氏斷無無故增入二字之理而謂朱子削去二字反以咎史氏則大賢不若是之詭或當時傳本有異又或前後改定未可定也韓氏又自以至無而至有五字釋無極而太極五字自謂亦是回護按此言乃正坐以老子之㫖又何回護之有如以至無而至有五字釋太極二字則可也蓋無極二字亦是釋太極耳釋則當緩于下不可加於上唯其加於上此所以合於外氏而有無極生太極之說也今人注古人之書者皆揚之使高鑿之使深者也唯朱子則推之使實扶之使正此其所以度越諸儒而得孔孟之傳也周子曰無極而太極實即無生有之㫖非但以無極明無形之義也觀下文無極之真四字可見以無極為明無形之義乃朱子之說所謂推之使實扶之使正者也朱子既以無形而有理釋無極而太極而於無極之真則釋云真字便是太極又云既舉無極則不復别舉太極如今說則此處缺太極字皆回護之詞豫謂以無極之真該太極何不竟言太極且此處不止缺太極字正是多無極字耳夫既以無極為無形矣而云無形之真可乎如謂真字是太極則猶言無極之太極矣亦無是理也故知周子之意非但以無極為明無形之義也朱子嘗云老子之言有無以有無為二周子之言有無以有無為一韓苑洛云周子亦以有無為二以有無為一乃朱子之正論也斯言得之矣至諸儒問答又往往涉於老氏之㫖如或問無極是無之至至無之中乃至有存焉故云無極而太極朱子曰如公說無極恁地說却好但太極說不去或曰有字便是太字地位朱子曰將有字訓太字不得太極只是箇理或曰至無之中乃萬理之至有也朱子曰亦得詳其語意是以無極為無以太極為有矣夫以無形訓無極者本欲明太極之為無而今反以有屬之則豈非無極二字纍之乎又有問無極太極只是一物者朱子曰本是一物被他恁地說却似兩物此言若反為陸子地者黃勉齊云後之讀者不知極字但為取喻而遽以理言不唯理不可無於周子無極之語有以難通且太極之為至理其詞已足而加以無極則誠似於贅者轉思之似亦足為陸子之一助蔡節齊謂周子以無極而太極發明易有太極之㫖謂周子所言太極即孔子所言太極是也而謂周子所言無極即孔子所言易遂謂無極之真實有得於孔子之一言者此其牽合之謬又益甚矣凡陸子之言其要在上天之載無聲無臭與神無方易無體二段朱子與陸子書皆條析以答獨不及此二段雖有云上天之載是就有中說無無極而太極是就無中說有乃朱子自為之說而於陸子致辨之意絶不相應蓋已知其理之不可奪也鮑魯齊云無極而太極一句是順說太極本無極一句是倒說上天之載無聲無臭猶周子所謂無極而太極也若移詩之二句倒言之曰無聲無臭上天之載亦何不可象山不肯拈太極本無極一句只攻上句徒肆强辨魯齊此言非也陸子云若謂欲言其無方所無形狀則宜如詩言上天之載而於其下贊之曰無聲無臭可也此即太極本無極之說也此句為陸子之所與又何攻焉然魯齊獨拈上天之載無聲無臭一段而不復拈神無方易無體一段則何也豫嘗究而論之周子之說原為有礙而朱子之注要於無疵朱子之回護周子者歸之於正而諸儒之尊奉朱子者則失之於偏此不易之言也然則周子非乎曰無中含有亦是吾儒正理無論其同於老氏與否但太極即無也既言太極又先言無極豫故謂周子之言有礙以其贅也陸子兄弟云太極圖說與通書不類疑非周子所為不然則或是其學未成時所作不然則或是傳他人之文又云太極圖說以無極二字冠首而通書終篇未嘗一及無極字二程言論文字至多亦未嘗一及無極字假令其初實有是圖觀其後來未嘗一及無極字可見其道之進而不自以為是也此言固大可省矣朱子謂無極二字乃周子灼見道體說出人不敢說底道理陸子云誠令如此不知人有甚不敢道處但加之太極之上則吾聖門正不肯如此道耳二程未嘗以此示人朱子謂其有微意張敬夫以書來問則云以無有能受之者爾夫太極圖說為明易而作也故曰大哉易也斯其至矣程子於易有傳矣豈謂有人受易而無人受太極圖說乎此皆理之可疑者也豫素信朱子如神明蓍蔡唯於此小異誠不敢以心之所未安者而徒剿襲雷同以蹈於自欺欺人之為也若後世之論無極者以為真贓實犯則輕薄之言斯戾矣或曰子以無極之說為有礙如何曰易有太極孔子之言也周子作太極圖說宜直援此句起而下綴以太極本無極也如繫辭大傳云神無方也易無體也此豈不可以為立言之法乎顧以無極二字加於太極之上是猶曰無方而神無體而易矣安得為無礙乎此豫所以謂陸子之說長也或曰何以云贅曰孔子云易有太極言太極而不言無極者尊孔子之言也周子云無極而太極言太極而必言無極者尊周子之言也孔子之言於理無缺則周子之言於理自贅如云為學者慮豈孔子之慮視周子疏乎後儒又以陸子嘗謂通書不言無極而欲尊太極圖說則云通書字字是發明太極圖說此語録套話如謂通書字字是發明大學亦可字字是發明中庸亦可也蓋其理自可相通其實通書自為通書不必牽附即云字字是發明太極圖說亦未嘗特發明無極也故無極二字終屬添出為蛇足耳王文成公有與徐成之書論朱陸同異雖其間有巧抑朱子處如云是其為言雖未盡瑩等語然其為陸子申辨則亦是公論不可廢也鄭端簡公論文成則曰王公才髙學邃兼資文武近世名卿鮮能及之特以講學故衆口交訾蓋公功名昭揭不可蓋覆唯學術邪正未易銓測以是指斥則讒說易行媢心稱快爾今人咸謂公異端陸子靜之流嗟乎子靜豈異端乎以異端視子靜則游夏純於顔曽而思孟劣於雄况矣豫謂論人物則文成於所謂三不朽者殆兼之焉自是一代儒臣冠冕論聖學則涉於一偏之見勇於自是者其失亦正不可掩也若今之論者排擊太甚乃至有併其功名毁之者又刻薄誣罔之言使端簡聞之不知當如何致慨矣然端簡游夏顔曽思孟雄况之喻豫三復之亦似失其倫也學者不讀宋儒書不可以言學今之紛紛於格物太極之說者總繇不細讀書故於其所分疏已明者猶鶻突致諸譏即豫所述者平心靜氣字字繹之亦可以渙然氷釋矣願學者早事正學無為昔人不讀唐以後書之言所誤如豫之蹉跎老大抱雕蟲之悔而悲歎於無及也正學隅見述
