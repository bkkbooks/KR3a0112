body:
  text: 正學隅見述儒家類提要臣等謹案正學隅見述一卷國朝王宏撰撰宏撰有周易筮述别著録是編以周子無極之説陸九淵爭之于前朱子格物之説王守仁軋之于後諸儒聚訟數百年而未休大抵尊朱者則全斥陸王為非尊陸王者則全斥朱子為謬迄無持是非之平者宏撰則以為格物之説當以朱子所註為是無極之説當以陸九淵所辨為是持論頗為平允其中雖歴引諸説以相詰難而詞氣皆極和平凡諸儒所稱先朝之亂由于學術不正其首禍為王陽明及所稱無極二字出于老子為周子真贓實犯者宏撰皆指為太過其言曰予素信朱子惟于無極太極之説小異誠不敢以心之所不安者徒勦襲雷同以蹈于自欺欺人之為其亦異于好為異論者矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀正學隅見述原序宏撰愚不知學唯讀古人之書以平心靜氣自矢罔敢逞其私臆而久之有是非判然於吾前者葢嘗有見於格物致知之訓朱子為正無極太極之辨陸子為長賢者之異無害其為同也今掇其㫖要著之於篇若為兩賢折衷宏撰何人斯而足語此庶幾下學一得質諸古人而幸其不遠也尚望有道君子惠而教之焉華山後學王宏撰無異識康熙十五年冬十一月朔
